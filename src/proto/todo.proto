syntax = "proto3";

service ToDoService {
  rpc AddTask(Task) returns (Task);
  rpc GetTask(TaskId) returns (Task);
  rpc ListTasks(Empty) returns (TaskList);
  rpc UpdateTask(Task) returns (Task);
  rpc DeleteTask(TaskId) returns (Task);
  rpc MarkTaskCompleted(TaskId) returns (Task);
}

message Task {
  int32 id = 1;
  string title = 2;
  string description = 3;
  bool completed = 4;
}

message Empty {}

message TaskList {
  repeated Task tasks = 1;
}

message TaskId {
  int32 id = 1;
}